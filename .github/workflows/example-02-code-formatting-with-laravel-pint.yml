name: Example 02 - Code Formatting with Laravel Pint
run-name: Example 02 - Code Formatting with Laravel Pint

on:
  push:
    branches:
      - master

jobs:
  run-pint-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.3

      - name: Install Laravel Pint
        run: composer require laravel/pint --dev

      - name: Run Pint
        run: ./vendor/bin/pint

      - name: commit changes back
        run: |
          git config --local.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m 'Run Pint'
          git push
