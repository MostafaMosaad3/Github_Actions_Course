name: 08-basics-variables.yml
run-name: ${{github.actor}} explain env variables - try number ${{github.run_number}}

env:
  MY_NAME: ${{github.actor}}
on:
  workflow_dispatch:


jobs:
  print-hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello World
        run: echo ${{env.MY_NAME}}
        
  print-hello-world-2:
    runs-on: ubuntu-latest
    env:
      MY_NAME2: mostafamosaad 2
    steps:
      - name: Print Hello World
        run: echo ${{env.MY_NAME2}}     
        

