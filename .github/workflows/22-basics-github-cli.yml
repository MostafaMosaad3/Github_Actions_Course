name: 22-basics-github-cli.yml
run-name: ${{github.actor}} explaining github cli - try number ${{github.run_number}}

on:
  workflow_dispatch:


jobs:
  open-new-issue-job:
    runs-on: ubuntu-latest
    steps:
      - name: open new issue
        run: gh issue create --title "I found a bug" --body "Nothing works"
        env:
         GH_TOKEN : ${{secrets.GITHUB_TOKEN}}
