name: 14-basics-matrix.yml

run-name: ${{ github.actor }} explains matrix - try number ${{ github.run_number }}

on:
  workflow_dispatch:

jobs:
  Build:
    runs-on: ${{ matrix.os }}

    strategy:
      max-parallel: 2
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.2 , 8.3 , 8.4]

        exclude:
          - os: ubuntu-latest
            php: 8.2
            
        include:
          - os: mac-latest
            php: 8.5

    steps:
      - name: build project
        run: echo "build project on ${{matrix.os}} with php version ${{matrix.php}}"
