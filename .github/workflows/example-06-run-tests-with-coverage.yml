name: 06 example - run tests with coverage
run-name: 06 example - run tests with coverage

on:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:latest
        env:
          MY_SQL_DATABASE: github_action_course
          MY_SQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306


    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.3

      - name: install dependencies
        run: composer install -q

      - name: prepare project
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: run tests
        run: php artisan test --coverage



